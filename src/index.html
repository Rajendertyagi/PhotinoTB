<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>TB</title>
  <style>
    body{margin:0;background:#202124;color:#fff;font-family:system-ui;display:flex;align-items:center;padding:0 10px;gap:8px;height:50px;overflow:hidden;-webkit-app-region:drag}
    .nav-btn{width:32px;height:32px;border:none;background:transparent;color:#9aa0a6;border-radius:50%;cursor:pointer;font-size:16px;-webkit-app-region:no-drag}
    .nav-btn:hover{background:#35363a;color:#fff}
    #url{flex:1;padding:6px 12px;border-radius:18px;border:none;background:#303134;color:#fff;outline:none;-webkit-app-region:no-drag}
    #go{padding:6px 16px;background:#5f6368;border:none;color:#fff;border-radius:18px;cursor:pointer;-webkit-app-region:no-drag}
    #go:hover{background:#70757a}
  </style>
</head>
<body>
  <button class="nav-btn" onclick="back()">←</button>
  <button class="nav-btn" onclick="forward()">→</button>
  <button class="nav-btn" onclick="reload()">⟳</button>
  <input id="url" placeholder="Search or enter URL" onkeydown="if(event.key==='Enter')go()">
  <button id="go" onclick="go()">Go</button>
  <script>
    const invoke = window.__TAURI__.core.invoke;
    async function go(){let u=document.getElementById('url').value;if(!u.startsWith('http'))u='https://'+u;await invoke('navigate',{url:u})}
    async function back(){await invoke('go_back')}
    async function forward(){await invoke('go_forward')}
    async function reload(){await invoke('reload')}
  </script>
</body>
</html>
