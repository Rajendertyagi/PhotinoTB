<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { margin:0; padding:0; background:#202124; color:#fff; font-family:system-ui; display:flex; align-items:center; padding:0 10px; gap:10px; overflow:hidden; }
        input { flex:1; padding:6px 12px; border-radius:15px; border:none; background:#303134; color:#fff; outline:none; }
        button { padding:6px 16px; background:#35363a; border:none; color:#fff; border-radius:15px; cursor:pointer; }
        button:hover { background:#555; }
    </style>
</head>
<body>
    <button onclick="window Photino.SendWebMessage(document.getElementById('url').value)">Go</button>
    <input id="url" placeholder="Enter URL (e.g., google.com)" onkeydown="if(event.key==='Enter') window.Photino.SendWebMessage(this.value)">
</body>
</html>
