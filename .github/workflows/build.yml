name: Build and Release Portable WinUI 3 App

on:
  push:
    branches: [ main ]
    tags:
      - 'v*' # Triggers the release process when you push a tag like v1.0.0
  workflow_dispatch: # Allows you to run this workflow manually from the Actions tab

permissions:
  contents: write # Required so the runner can create a release and upload assets

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Uses the .NET 8 runtime to build your target framework

    - name: Publish Portable App (Self-Contained)
      run: |
        dotnet publish -c Release -r win-x64 --self-contained true -p:Platform=x64 -o ./portable-build

    - name: Zip the Output Folder
      shell: pwsh
      run: |
        Compress-Archive -Path ./portable-build/* -DestinationPath ./WinUI3-Portable-x64.zip

    - name: Upload Build Artifact (Internal GitHub Storage)
      uses: actions/upload-artifact@v4
      with:
        name: Portable-App-Package
        path: ./WinUI3-Portable-x64.zip

    # This step only runs if you pushed a tag (e.g., git tag v1.0.0 && git push origin v1.0.0)
    - name: Create Official GitHub Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: ./WinUI3-Portable-x64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
