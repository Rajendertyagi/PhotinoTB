name: Build TB (Phase 1)
on: [push, workflow_dispatch]
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '10.0.x' }

      - name: Clean Everything
        run: |
          Remove-Item -Recurse -Force obj, bin, publish -ErrorAction SilentlyContinue
          Get-ChildItem -Recurse -Filter *.zip | Remove-Item -Force
          dotnet restore

      - name: Build
        run: dotnet build TB.csproj --configuration Release --no-restore -r win-x64

      - name: Copy to Publish (Exclude ZIPs)
        run: |
          New-Item -ItemType Directory -Force -Path ./publish
          Get-ChildItem -Path ./bin/Release/net10.0-windows/win-x64 | 
            Where-Object { $_.Extension -ne '.zip' } | 
            Copy-Item -Destination ./publish -Recurse -Force

      - name: Create Final ZIP (in root, not publish)
        run: |
          Compress-Archive -Path publish\* -DestinationPath TB-Portable.zip -Force
          Write-Host "Final ZIP contents:"
          Get-ChildItem TB-Portable.zip | Select-Object Name, Length

      - uses: actions/upload-artifact@v7
        with:
          name: TB-Portable
          path: TB-Portable.zip
          retention-days: 14
