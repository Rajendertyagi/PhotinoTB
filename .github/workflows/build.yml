name: Build and Release Portable Browser

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Grants the GITHUB_TOKEN permission to create releases and upload assets
permissions:
  contents: write

# Forces GitHub Actions to use Node 24, suppressing the Node 20 deprecation warnings
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore & Publish
      run: |
        dotnet restore src/TradingBrowser/TradingBrowser.csproj
        dotnet publish src/TradingBrowser/TradingBrowser.csproj -c Release -r win-x64 -o ./publish

    - name: Download WebView2 Bootstrapper
      shell: pwsh
      run: |
        Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "./publish/WebView2Bootstrapper.exe"

    - name: Create Portable Folders
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "./publish/UserData"
        New-Item -ItemType Directory -Force -Path "./publish/logs"

    - name: Package Zip
      shell: pwsh
      run: Compress-Archive -Path "./publish/*" -DestinationPath "./TradingBrowser-Portable-win-x64.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TradingBrowser-Portable
        path: ./TradingBrowser-Portable-win-x64.zip

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        name: Release v${{ github.run_number }}
        files: ./TradingBrowser-Portable-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
