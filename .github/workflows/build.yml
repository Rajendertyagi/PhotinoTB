name: Build TB (Phase 1)
on: [push, workflow_dispatch]
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '10.0.x' }

      - run: Remove-Item -Recurse -Force obj, bin -ErrorAction SilentlyContinue; dotnet restore

      - run: dotnet build TB.csproj --configuration Release --no-restore

      - run: |
          New-Item -ItemType Directory -Force -Path ./publish
          Copy-Item -Recurse -Force ./bin/Release/net10.0-windows/win-x64/* ./publish/

      - run: Compress-Archive -Path publish\* -DestinationPath TB-Portable.zip -Force

      - uses: actions/upload-artifact@v7
        with: { name: TB-Portable, path: TB-Portable.zip, retention-days: 14 }
