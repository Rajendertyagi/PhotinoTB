name: Build Portable WinUI 3 App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # Match this to your project's .NET version

    - name: Publish Portable App
      run: |
        dotnet publish -c Release -r win10-x64 --self-contained true -p:Platform=x64 -o ./portable-build

    - name: Zip the Output Folder
      shell: pwsh
      run: |
        Compress-Archive -Path ./portable-build/* -DestinationPath ./WinUI3-Portable-x64.zip

    - name: Upload Artifact to GitHub
      uses: actions/upload-artifact@v4
      with:
        name: Portable-App-Package
        path: ./WinUI3-Portable-x64.zip
