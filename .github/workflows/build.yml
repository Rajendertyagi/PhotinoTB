name: Build and Release Portable Browser

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x' # Adjust if using preview feeds

    - name: Restore & Publish
      run: |
        dotnet restore src/TradingBrowser/TradingBrowser.csproj
        dotnet publish src/TradingBrowser/TradingBrowser.csproj -c Release -r win-x64 -o ./publish

    - name: Download WebView2 Fixed Runtime
      shell: pwsh
      run: |
        # Downloads the Evergreen Standalone (replace with Fixed Version URL if strictly required)
        Invoke-WebRequest -Uri "https://go.microsoft.com/fwlink/p/?LinkId=2124703" -OutFile "./publish/WebView2Bootstrapper.exe"
        # Note: For true offline Fixed Version, download the MS Edge WebView2 Fixed Version ZIP from MS and extract to ./publish/WebView2Runtime/

    - name: Create Portable Folders
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "./publish/UserData"
        New-Item -ItemType Directory -Force -Path "./publish/logs"

    - name: Package Zip
      shell: pwsh
      run: Compress-Archive -Path "./publish/*" -DestinationPath "./TradingBrowser-Portable-win-x64.zip"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TradingBrowser-Portable
        path: ./TradingBrowser-Portable-win-x64.zip

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ github.run_number }}
        files: ./TradingBrowser-Portable-win-x64.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
