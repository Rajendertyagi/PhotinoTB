name: Build TB (Phase 1)
on: [push, workflow_dispatch]
env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - uses: actions/setup-dotnet@v5
        with: { dotnet-version: '10.0.x' }

      - name: 🧹 Deep Clean
        run: |
          Write-Host "Removing bin, obj, publish folders..."
          Remove-Item -Recurse -Force bin, obj, publish -ErrorAction SilentlyContinue
          Write-Host "Removing all .zip files from repository..."
          Get-ChildItem -Recurse -Filter *.zip | Remove-Item -Force
          Write-Host "✅ Clean complete."

      - name: 📦 Restore & Build
        run: |
          dotnet restore
          dotnet build TB.csproj --configuration Release --no-restore -r win-x64

      - name: 📂 Prepare Publish Folder
        run: |
          # Ensure publish folder is absolutely empty and fresh
          Remove-Item -Recurse -Force ./publish -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Path ./publish | Out-Null
          
          Write-Host "Copying files to publish..."
          $sourcePath = "./bin/Release/net10.0-windows/win-x64"
          
          if (Test-Path $sourcePath) {
              Get-ChildItem -Path $sourcePath | 
                Where-Object { $_.Extension -ne '.zip' } | 
                Copy-Item -Destination ./publish -Recurse -Force
              Write-Host "✅ Copied contents from $sourcePath."
          } else {
              Write-Error "❌ Build output not found at $sourcePath!"
          }

      - name: 🔍 Verify Contents
        run: |
          Write-Host " Listing ./publish contents (checking for nested zips):"
          Get-ChildItem -Path ./publish -Recurse | Select-Object FullName, Length
          $zipCount = (Get-ChildItem -Path ./publish -Recurse -Filter *.zip).Count
          if ($zipCount -gt 0) {
              Write-Error "❌ ERROR: Found $zipCount zip files in publish folder! Build will be corrupted."
          } else {
              Write-Host "✅ No nested zips found."
          }

      - name: 🗜️ Create Final ZIP
        run: |
          Write-Host "Creating archive..."
          if (Test-Path TB-Portable.zip) { Remove-Item TB-Portable.zip }
          
          Compress-Archive -Path ./publish/* -DestinationPath TB-Portable.zip -Force
          Write-Host "✅ TB-Portable.zip created in root directory."
          
          Write-Host "📦 Final artifact size:"
          Get-Item TB-Portable.zip | Select-Object Name, Length

      - name: 🚀 Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: TB-Portable
          path: TB-Portable.zip
          retention-days: 14
